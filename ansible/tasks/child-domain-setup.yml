---
# ==============================================================================
# DVAD - Child Domain (EU.CORP.LOCAL) Setup
# Target: dc01.eu.corp.local
# ==============================================================================

- name: Set static IP and DNS
  win_shell: |
    Start-Sleep -Seconds 5
    $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -First 1
    $ip = "10.10.0.11"
    $prefix = 21
    $gateway = "10.10.0.1"
    $dns = "10.10.0.10"
    netsh interface ip set address "$($adapter.Name)" static $ip 255.255.248.0 $gateway 1
    netsh interface ip set dns "$($adapter.Name)" static $dns
    Write-Host "IP configured: $ip/21"
  async: 20
  poll: 0

- name: Wait for background IP change to drop the network adapter
  pause:
    seconds: 15

- name: Wait for network to stabilize
  wait_for_connection:
    timeout: 60

- name: Reset WinRM connection to clear stale sockets
  meta: reset_connection

- name: Set hostname to DC01-EU
  win_hostname:
    name: "DC01-EU"
  register: hostname_result

- name: Install AD DS Features
  win_feature:
    name:
      - AD-Domain-Services
      - DNS
      - GPMC
      - RSAT-ADDS
      - RSAT-DNS-Server
      - RSAT-AD-PowerShell
    state: present
    include_management_tools: yes
  register: ad_ds_install

- name: Reboot if required before promotion
  win_reboot:
  when: ad_ds_install.reboot_required or hostname_result.reboot_required

- name: Wait for host to come back
  wait_for_connection:
    delay: 30
    timeout: 600

- name: Wait for CORP.LOCAL AD DS to be fully online and responsive
  win_shell: |
    Write-Host "Waiting for 10.10.0.10 to open LDAP port..."
    while ($true) {
        $tcp = Test-NetConnection -ComputerName 10.10.0.10 -Port 389 -WarningAction SilentlyContinue
        if ($tcp.TcpTestSucceeded) {
            Write-Host "LDAP is UP! Giving AD DS 30 extra seconds to stabilize..."
            Start-Sleep -Seconds 30
            break
        }
        Start-Sleep -Seconds 15
    }
  timeout: 900

- name: Create child domain eu.corp.local
  win_shell: |
    Import-Module ADDSDeployment
    $params = @{
      NewDomainName                = "eu"
      ParentDomainName             = "corp.local"
      DomainType                   = "ChildDomain"
      InstallDns                   = $true
      CreateDnsDelegation          = $true
      Credential                   = (New-Object System.Management.Automation.PSCredential("CORP\Administrator", (ConvertTo-SecureString "DVADlab2024!" -AsPlainText -Force)))
      SafeModeAdministratorPassword = (ConvertTo-SecureString "DVADlab2024!" -AsPlainText -Force)
      DatabasePath                 = "C:\Windows\NTDS"
      LogPath                      = "C:\Windows\NTDS"
      SysvolPath                   = "C:\Windows\SYSVOL"
      NoRebootOnCompletion         = $false
      Force                        = $true
    }
    Install-ADDSDomain @params
  register: child_promotion
  async: 1800
  poll: 0

- name: Dynamically switch to Domain Admin credentials while rebooting
  set_fact:
    ansible_user: "Administrator@eu.corp.local"

- name: Wait for child DC to reboot and WinRM to come back up with new credentials
  wait_for_connection:
    delay: 60
    timeout: 900
