---
# ==============================================================================
# DVAD - Domain Join for Member Servers
# Target: ca01, file01, sql01, ws01
# ==============================================================================

- name: Set static IP and DNS for corp member servers
  win_shell: |
    $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -First 1
    $ip = "{{ ansible_host }}"
    $prefix = 21
    $gateway = "10.10.0.1"
    $dns = "10.10.0.10"
    netsh interface ip set address "$($adapter.Name)" static $ip 255.255.248.0 $gateway 1
    netsh interface ip set dns "$($adapter.Name)" static $dns
    Write-Host "IP configured: $ip/21"

- name: Set hostname from short name
  win_hostname:
    name: "{{ inventory_hostname.split('.')[0] | upper }}"
  register: hostname_result

- name: Reboot if hostname changed
  win_reboot:
  when: hostname_result.reboot_required

- name: Wait for host
  wait_for_connection:
    delay: 30
    timeout: 300

- name: Join corp.local domain
  microsoft.ad.membership:
    dns_domain_name: corp.local
    hostname: "{{ inventory_hostname.split('.')[0] | upper }}"
    domain_admin_user: CORP\Administrator
    domain_admin_password: "DVADlab2024!"
    state: domain
    reboot: false
  register: domain_join

- name: Reboot after domain join
  win_reboot:
    reboot_timeout: 600
  when: domain_join.reboot_required | default(false)

- name: Wait for domain join to complete
  wait_for_connection:
    delay: 45
    timeout: 600
  when: domain_join.reboot_required
