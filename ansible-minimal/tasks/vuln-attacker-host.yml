---
# ==============================================================================
# DVAD - Attacker Workstation Setup (WS01)
# Target: ws01.corp.local
# ==============================================================================

- name: Install attacker tools packages
  win_shell: |
    # Install chocolatey / package manager silently
    Set-ExecutionPolicy Bypass -Scope Process -Force
    [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
    iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
    choco install -y vscode 2>$null
    choco install -y git 2>$null
    choco install -y python3 2>$null
    choco install -y sysinternals 2>$null
  ignore_errors: yes

- name: Download common AD attack tools
  win_shell: |
    $tools = @{
      "C:\DVAD\tools\mimikatz.exe" = "https://github.com/gentilkiwi/mimikatz/releases/download/2.2.0-20220919/mimikatz_trunk.zip"
      "C:\DVAD\tools\bloodhound.zip" = "https://github.com/BloodHoundAD/BloodHound/releases/download/v4.3.1/BloodHound-win32-x64.zip"
      "C:\DVAD\tools\SharpHound.exe" = "https://github.com/BloodHoundAD/SharpHound/releases/download/v1.1.1/SharpHound.exe"
      "C:\DVAD\tools\Rubeus.exe" = "https://github.com/GhostPack/Rubeus/releases/download/2.2.0/Rubeus.exe"
      "C:\DVAD\tools\Certify.exe" = "https://github.com/GhostPack/Certify/releases/download/1.0.0/Certify.exe"
      "C:\DVAD\tools\SharpUp.exe" = "https://github.com/GhostPack/SharpUp/releases/download/1.0/SharpUp.exe"
      "C:\DVAD\tools\Seatbelt.exe" = "https://github.com/GhostPack/Seatbelt/releases/download/1.1.1/Seatbelt.exe"
      "C:\DVAD\tools\SharpView.exe" = "https://github.com/tevora-threat/SharpView/releases/download/v0.1/SharpView.exe"
      "C:\DVAD\tools\Inveigh.exe" = "https://github.com/Kevin-Robertson/Inveigh/releases/download/v2.0.0/Inveigh.exe"
      "C:\DVAD\tools\Responder.exe" = "https://github.com/lgandx/Responder/releases/download/v3.1.3.0/Responder.exe"
      "C:\DVAD\tools\impacket.zip" = "https://github.com/fortra/impacket/releases/download/impacket_0_12_0/impacket-0.12.0.tar.gz"
    }
    foreach ($kvp in $tools.GetEnumerator()) {
      try {
        Invoke-WebRequest -Uri $kvp.Value -OutFile $kvp.Key -UseBasicParsing -ErrorAction SilentlyContinue
      } catch {}
    }
  ignore_errors: yes

- name: Add attacker user to local admin for unrestricted access
  win_shell: |
    net localgroup Administrators CORP\attacker /add
  ignore_errors: yes

- name: Configure Kali-like PowerShell profile
  win_shell: |
    $profilePath = "$PROFILE.AllUsersAllHosts"
    $dir = Split-Path $profilePath
    if (-not (Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force | Out-Null }
    Set-Content -Path $profilePath -Value "`$Host.UI.RawUI.WindowTitle = 'DVAD - Attacker Workstation'"
    Add-Content -Path $profilePath -Value "Write-Host '=== DVAD Attack Workstation ===' -ForegroundColor Green"
    Add-Content -Path $profilePath -Value "Write-Host 'Tools: C:\DVAD\tools\' -ForegroundColor Cyan"
    Add-Content -Path $profilePath -Value "Write-Host ''"
  ignore_errors: yes

- name: Disable Windows Defender on attacker workstation
  win_shell: |
    Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
    Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue
    Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue
    Set-MpPreference -DisableScriptScanning $true -ErrorAction SilentlyContinue
  ignore_errors: yes
