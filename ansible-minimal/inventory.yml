        domain_netbios: CORP
        domain_safe_mode_password: "DVADlab2024!"
        domain_admin_user: Administrator
        domain_admin_password: "DVADlab2024!"
        forest_functional_level: "WinThreshold"
        domain_functional_level: "WinThreshold"
        subnet: 10.10.0.0/21
      children:
        corp_dcs:
          hosts:
            dc01.corp.local:
              ansible_host: 10.10.0.10
              ansible_winrm_host: 10.10.0.10
              role: primary_dc
              is_dc: true
              is_dns_server: true
              is_adcs_ca: false
        corp_servers:
          hosts:
            ca01.corp.local:
              ansible_host: 10.10.0.12
              ansible_winrm_host: 10.10.0.12
              role: adcs_server
              is_dc: false
              is_adcs_ca: true
            file01.corp.local:
              ansible_host: 10.10.0.13
              ansible_winrm_host: 10.10.0.13
              role: file_server
              is_dc: false
            sql01.corp.local:
              ansible_host: 10.10.0.14
              ansible_winrm_host: 10.10.0.14
              role: sql_server
              is_dc: false
        corp_workstation:
