---
- name: Ensure correct lab password and gather facts
  hosts: all
  gather_facts: no
  tasks:
    - name: Test 1 - Standard Local Admin
      win_ping:
      vars:
        ansible_user: "Administrator"
        ansible_password: "DVADlab2024!"
      register: test1
      ignore_unreachable: yes

    - name: Test 2 - QCOW2 Default Local Admin
      win_ping:
      vars:
        ansible_user: "Administrator"
        ansible_password: "Dvadlab2024!"
      register: test2
      ignore_unreachable: yes
      when: test1.unreachable is defined and test1.unreachable

    - name: Test 3 - Domain Admin (Already Promoted)
      win_ping:
      vars:
        ansible_user: "Administrator@{{ domain_name | default('corp.local') }}"
        ansible_password: "DVADlab2024!"
      register: test3
      ignore_unreachable: yes
      when: (test1.unreachable is defined and test1.unreachable) and (test2.unreachable is defined and test2.unreachable)

    - name: Fail if all connection methods are unreachable
      fail:
        msg: "Failed to connect to host with any known password combination."
      when: (test1.unreachable is defined and test1.unreachable) and (test2.unreachable is defined and test2.unreachable) and (test3.unreachable is defined and test3.unreachable)

    - name: Change Administrator password if using QCOW2 Default
      ansible.windows.win_user:
        name: Administrator
        password: "DVADlab2024!"
        state: present
      vars:
        ansible_user: "Administrator"
        ansible_password: "Dvadlab2024!"
      when: test2.ping is defined

    - name: Set correct ansible_user for the rest of the playbook
      set_fact:
        ansible_user: "Administrator@{{ domain_name | default('corp.local') }}"
      when: test3.ping is defined

    - name: Set standard ansible_password for the rest of the playbook
      set_fact:
        ansible_password: "DVADlab2024!"

    - name: Gather facts now that credentials are correct
      setup:
