---
- name: Install AD Domain Services
  ansible.windows.win_feature:
    name: AD-Domain-Services
    state: present
    include_management_tools: yes
  register: ad_install

- name: Install DNS Server
  ansible.windows.win_feature:
    name: DNS
    state: present
  when: inventory_hostname in groups['corp_dcs'] or inventory_hostname in groups['finance_dcs'] or inventory_hostname in groups['root_dcs']

- name: Promote CORP forest
  ansible.windows.win_shell: |
    $role = (Get-CimInstance -ClassName Win32_ComputerSystem).DomainRole
    if ($role -in 4, 5) {
        Write-Host "Already a Domain Controller. Skipping."
        exit 0
    }
    Import-Module ADDSDeployment
    $securePassword = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
    Install-ADDSForest `
      -DomainName "{{ domain_name }}" `
      -DomainNetbiosName "{{ domain_netbios }}" `
      -ForestMode "WinThreshold" `
      -DomainMode "WinThreshold" `
      -InstallDns:$true `
      -SafeModeAdministratorPassword $securePassword `
      -NoRebootOnCompletion:$false `
      -Force:$true
  when: inventory_hostname == 'dc01.corp.local'
  register: promote_forest

- name: Wait for DC reboot
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600
  when: promote_forest.changed | default(false)

- name: Promote EU child domain
  ansible.windows.win_shell: |
    $role = (Get-CimInstance -ClassName Win32_ComputerSystem).DomainRole
    if ($role -in 4, 5) {
        Write-Host "Already a Domain Controller. Skipping."
        exit 0
    }
    Import-Module ADDSDeployment
    $securePassword = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
    Install-ADDSDomain `
      -NewDomainName "eu" `
      -ParentDomainName "{{ domain_name }}" `
      -DomainType "ChildDomain" `
      -InstallDNS:$true `
      -CreateDNSDelegation:$true `
      -Credential (New-Object System.Management.Automation.PSCredential("{{ domain_netbios }}\\Administrator", $securePassword)) `
      -SafeModeAdministratorPassword $securePassword `
      -Force:$true
  when: inventory_hostname == 'dc01.eu.corp.local'
  register: promote_child

- name: Wait for child DC reboot
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600
  when: promote_child.changed | default(false)

- name: Promote FINANCE forest
  ansible.windows.win_shell: |
    $role = (Get-CimInstance -ClassName Win32_ComputerSystem).DomainRole
    if ($role -in 4, 5) {
        Write-Host "Already a Domain Controller. Skipping."
        exit 0
    }
    Import-Module ADDSDeployment
    $securePassword = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
    Install-ADDSForest `
      -DomainName "finance.local" `
      -DomainNetbiosName "FINANCE" `
      -ForestMode "WinThreshold" `
      -DomainMode "WinThreshold" `
      -InstallDns:$true `
      -SafeModeAdministratorPassword $securePassword `
      -NoRebootOnCompletion:$false `
      -Force:$true
  when: inventory_hostname == 'dc01.finance.local'
  register: promote_finance

- name: Promote ROOT forest
  ansible.windows.win_shell: |
    $role = (Get-CimInstance -ClassName Win32_ComputerSystem).DomainRole
    if ($role -in 4, 5) {
        Write-Host "Already a Domain Controller. Skipping."
        exit 0
    }
    Import-Module ADDSDeployment
    $securePassword = ConvertTo-SecureString "{{ domain_admin_password }}" -AsPlainText -Force
    Install-ADDSForest `
      -DomainName "root.corp" `
      -DomainNetbiosName "ROOT" `
      -ForestMode "WinThreshold" `
      -DomainMode "WinThreshold" `
      -InstallDns:$true `
      -SafeModeAdministratorPassword $securePassword `
      -NoRebootOnCompletion:$false `
      -Force:$true
  when: inventory_hostname == 'dc01.root.corp'
  register: promote_root

- name: Wait for finance/root DC reboots
  ansible.builtin.wait_for_connection:
    delay: 30
    timeout: 600
  when: promote_finance.changed | default(false) or promote_root.changed | default(false)

- name: Wait for Active Directory Web Services (ADWS) to start
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    while ((Get-Service -Name ADWS -ErrorAction SilentlyContinue).Status -ne 'Running') {
        Start-Sleep -Seconds 5
    }
    Write-Host "ADWS service is running. Waiting for AD cmdlets to respond..."
    while ($true) {
        try {
            $null = Get-ADDomain -ErrorAction Stop
            Write-Host "ADWS is fully responsive."
            break
        } catch {
            Start-Sleep -Seconds 5
        }
    }
  when: inventory_hostname == 'dc01.corp.local'

- name: Create AD objects and set rights
  ansible.windows.win_shell: |
    Import-Module ActiveDirectory
    $domain = "{{ domain_name }}"
    
    # 1. Create OUs and Groups
    New-ADOrganizationalUnit -Name "ServiceAccounts" -Path "DC=corp,DC=local" -ProtectedFromAccidentalDeletion $false -ErrorAction SilentlyContinue
    New-ADOrganizationalUnit -Name "Computers" -Path "DC=corp,DC=local" -ProtectedFromAccidentalDeletion $false -ErrorAction SilentlyContinue
    New-ADOrganizationalUnit -Name "Servers" -Path "DC=corp,DC=local" -ProtectedFromAccidentalDeletion $false -ErrorAction SilentlyContinue
    New-ADOrganizationalUnit -Name "GPO_Testing" -Path "DC=corp,DC=local" -ProtectedFromAccidentalDeletion $false -ErrorAction SilentlyContinue
    New-ADOrganizationalUnit -Name "Restricted" -Path "DC=corp,DC=local" -ProtectedFromAccidentalDeletion $false -ErrorAction SilentlyContinue
    New-ADGroup -Name "SHIELD Agents" -SamAccountName "SHIELD Agents" -GroupCategory Security -GroupScope Global -Path "OU=Restricted,DC=corp,DC=local" -ErrorAction SilentlyContinue
    New-ADGroup -Name "Avengers Admins" -SamAccountName "Avengers Admins" -GroupCategory Security -GroupScope Global -Path "OU=Restricted,DC=corp,DC=local" -ErrorAction SilentlyContinue
    New-ADGroup -Name "Stark Tech DBAs" -SamAccountName "Stark Tech DBAs" -GroupCategory Security -GroupScope Global -Path "OU=ServiceAccounts,DC=corp,DC=local" -ErrorAction SilentlyContinue
    New-ADGroup -Name "Pym Tech Devs" -SamAccountName "Pym Tech Devs" -GroupCategory Security -GroupScope Universal -Path "OU=Restricted,DC=corp,DC=local" -ErrorAction SilentlyContinue

    # 2. Create domain users
    $users = @(
      @{Name="loki"; Password="{{ domain_admin_password }}"; Groups=@("Domain Users", "Remote Desktop Users")},
      @{Name="peter.parker"; Password="Password123!"; Groups=@("Domain Users")},
      @{Name="tony.stark"; Password="Welcome1"; Groups=@("Domain Users")},
      @{Name="steve.rogers"; Password="Summer2025!"; Groups=@("Domain Users")},
      @{Name="bruce.banner"; Password="Password123!"; Groups=@("Domain Users")},
      @{Name="svc_vision"; Password="WebSvc2025!"; Groups=@("Domain Users", "Avengers Admins"); SPN="HTTP/web.corp.local"},
      @{Name="svc_jarvis"; Password="SqlSvc2025!"; Groups=@("Domain Users", "Stark Tech DBAs"); SPN="MSSQLSvc/sql01.corp.local:1433"},
      @{Name="svc_thanos"; Password="NoPreAuth1!"; Groups=@("Domain Users"); NoPreAuth=$true},
      @{Name="heimdall"; Password="Backup1!"; Groups=@("Backup Operators"); Reversible=$true},
      @{Name="nick.fury"; Password="HelpDesk1!"; Groups=@("Domain Users", "SHIELD Agents", "Account Operators")},
      @{Name="doctor.strange"; Password="Sync1!"; Groups=@("Domain Users"); DCSync=$true},
      @{Name="wong"; Password="Rodc1!"; Groups=@("Domain Users")},
      @{Name="developer1"; Password="Dev123!"; Groups=@("Domain Users", "Pym Tech Devs")},
      @{Name="qa_user"; Password="Qa123!"; Groups=@("Domain Users"); Description="QA account with path to SQL"},
      @{Name="hr_user"; Password="Hr123!"; Groups=@("Domain Users", "HR")}
    )
    foreach ($u in $users) {
      $secPwd = ConvertTo-SecureString $u.Password -AsPlainText -Force
      $params = @{
        Name = $u.Name
        SamAccountName = $u.Name
        UserPrincipalName = "$($u.Name)@{{ domain_name }}"
        AccountPassword = $secPwd
        Enabled = $true
        PasswordNeverExpires = $true
        CannotChangePassword = $false
        Path = "CN=Users,DC=corp,DC=local"
      }
      if ($u.ContainsKey("Description")) { $params.Description = $u.Description }
      try { New-ADUser @params -ErrorAction SilentlyContinue } catch {}
      if ($u.ContainsKey("SPN")) { Set-ADUser -Identity $u.Name -ServicePrincipalNames @{Add=$u.SPN} -ErrorAction SilentlyContinue }
      if ($u.ContainsKey("NoPreAuth") -and $u.NoPreAuth) { Set-ADAccountControl -Identity $u.Name -DoesNotRequirePreAuth $true -ErrorAction SilentlyContinue }
      if ($u.ContainsKey("Reversible") -and $u.Reversible) { Set-ADUser -Identity $u.Name -AllowReversiblePasswordEncryption $true -ErrorAction SilentlyContinue }
      foreach ($g in $u.Groups) {
        try { Add-ADGroupMember -Identity $g -Members $u.Name } catch {}
      }
    }

    # 3. Set DCSync rights for doctor.strange
    $user = Get-ADUser -Identity "doctor.strange"
    $acl = Get-ACL "AD:\DC=corp,DC=local"
    $sid = [System.Security.Principal.SecurityIdentifier] $user.SID
    $guid1 = [Guid]"1131f6aa-9c07-11d1-f79f-00c04fc2dcd2"
    $guid2 = [Guid]"1131f6ad-9c07-11d1-f79f-00c04fc2dcd2"
    $rule1 = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, [System.DirectoryServices.ActiveDirectoryRights]::ExtendedRight, [System.Security.AccessControl.AccessControlType]::Allow, $guid1)
    $rule2 = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, [System.DirectoryServices.ActiveDirectoryRights]::ExtendedRight, [System.Security.AccessControl.AccessControlType]::Allow, $guid2)
    $acl.AddAccessRule($rule1)
    $acl.AddAccessRule($rule2)
    Set-ACL "AD:\DC=corp,DC=local" $acl

    exit 0
  when: inventory_hostname == 'dc01.corp.local'
  ignore_errors: yes
