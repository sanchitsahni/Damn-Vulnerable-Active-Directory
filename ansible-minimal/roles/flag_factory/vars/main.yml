---
# ==============================================================================
# DVAD - Flag Manifest (single source of truth)
# Every PLAN.md attack-matrix ID. Drives flag_factory role.
#
# Schema:
#   id        : matrix ID
#   cat       : category (Recon, Credential, Lateral, PrivilegeEsc,
#               Persistence, DomainForest, InitialAccess, Enumeration)
#   desc      : short description (also used in flag content)
#   host      : inventory_hostname where the flag is dropped
#   acl       : "system_only" | "admins" | "domain_users" | "everyone"
#
# host == "" means "drop on dc01.corp.local by default". Many runtime-only
# techniques (forge ticket, dump LSASS, etc.) have a meaningful staging host
# even though the actual exploitation happens at runtime.
# ==============================================================================

