---
# ==============================================================================
# DVAD Ansible Inventory
# Multi-Forest Active Directory Lab
# ==============================================================================

all:
  vars:
    ansible_connection: winrm
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_user: Administrator
    ansible_password: "DVADlab2024!"
    ansible_winrm_operation_timeout_sec: 120
    ansible_winrm_read_timeout_sec: 180
    ansible_port: 5985
    dvad_home: "{{ playbook_dir }}/.."

  children:
    # =========================================================================
    # CORP.LOCAL Domain
    # =========================================================================
    corp_domain:
      vars:
        domain_name: corp.local
        domain_netbios: CORP
        domain_safe_mode_password: "DVADlab2024!"
        domain_admin_user: Administrator
        domain_admin_password: "DVADlab2024!"
        forest_functional_level: "WinThreshold"
        domain_functional_level: "WinThreshold"
        subnet: 10.10.0.0/21
      children:
        corp_dcs:
          hosts:
            dc01.corp.local:
              ansible_host: 10.10.0.10
              ansible_winrm_host: 10.10.0.10
              role: primary_dc
              is_dc: true
              is_dns_server: true
              is_adcs_ca: false
            dc01.eu.corp.local:
              ansible_host: 10.10.0.11
              ansible_winrm_host: 10.10.0.11
              role: child_dc
              is_dc: true
              parent_domain: corp.local
              child_domain: eu.corp.local
        corp_servers:
          hosts:
            ca01.corp.local:
              ansible_host: 10.10.0.12
              ansible_winrm_host: 10.10.0.12
              role: adcs_server
              is_dc: false
              is_adcs_ca: true
            file01.corp.local:
              ansible_host: 10.10.0.13
              ansible_winrm_host: 10.10.0.13
              role: file_server
              is_dc: false
            sql01.corp.local:
              ansible_host: 10.10.0.14
              ansible_winrm_host: 10.10.0.14
              role: sql_server
              is_dc: false
        corp_workstation:
          hosts:
            ws01.corp.local:
              ansible_host: 10.10.0.100
              ansible_winrm_host: 10.10.0.100
              role: attacker_workstation
              is_dc: false
              is_attacker_host: true

    # =========================================================================
    # FINANCE.LOCAL Domain
    # =========================================================================
    finance_domain:
      vars:
        domain_name: finance.local
        domain_netbios: FINANCE
        domain_safe_mode_password: "DVADlab2024!"
        subnet: 10.20.0.0/24
      children:
        finance_dcs:
          hosts:
            dc01.finance.local:
              ansible_host: 10.20.0.10
              ansible_winrm_host: 10.20.0.10
              role: external_dc
              is_dc: true
              is_dns_server: true

    # =========================================================================
    # ROOT.CORP Domain
    # =========================================================================
    root_corp_domain:
      vars:
        domain_name: root.corp
        domain_netbios: ROOT
        domain_safe_mode_password: "DVADlab2024!"
        subnet: 10.30.0.0/24
      children:
        root_dcs:
          hosts:
            dc01.root.corp:
              ansible_host: 10.30.0.10
              ansible_winrm_host: 10.30.0.10
              role: root_dc
              is_dc: true
              is_dns_server: true

    # =========================================================================
    # All Domain Controllers
    # =========================================================================
    all_dcs:
      children:
        corp_dcs:
        finance_dcs:
        root_dcs:

    # =========================================================================
    # All Member Servers (non-DCs)
    # =========================================================================
    member_servers:
      children:
        corp_servers:
        corp_workstation:
