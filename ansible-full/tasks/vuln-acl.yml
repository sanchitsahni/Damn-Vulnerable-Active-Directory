    $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
    $acl = Get-ACL "AD:\$target"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "Self", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$target" $acl
  ignore_errors: yes

- name: ForceChangePassword from developer1 to helpdesk
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "developer1"
