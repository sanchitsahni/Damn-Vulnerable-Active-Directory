---
# ==============================================================================
# DVAD - ACL Abuse Configuration
# Target: dc01.corp.local
# ==============================================================================

- name: Grant GenericAll from user1 to user2 (take over account)
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "user1"
    $target = Get-ADUser -Identity "user2"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
    $acl = Get-ACL "AD:\$target"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericAll", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$target" $acl
  ignore_errors: yes

- name: Grant WriteSPN to helpdesk on svc_web (Kerberoast pivot)
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "helpdesk"
    $target = Get-ADUser -Identity "svc_web"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
    $acl = Get-ACL "AD:\$target"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "WriteProperty", "Allow", [guid]"f3a64788-5306-11d1-a9c5-0000f80367c1")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$target" $acl
  ignore_errors: yes

- name: Grant AddSelf on IT Admins to qa_user (group membership abuse)
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "qa_user"
