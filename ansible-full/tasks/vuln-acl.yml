    $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
    $acl = Get-ACL "AD:\$target"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "ExtendedRight", "Allow", [guid]"00299570-246d-11d0-a768-00aa006e0529")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$target" $acl
  ignore_errors: yes

- name: Grant GenericAll from domain user to DACL for RBCD comps
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "attacker"
    $comps = @("FILE01","SQL01")
    foreach ($c in $comps) {
      $comp = Get-ADComputer -Identity $c
      $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
      $acl = Get-ACL "AD:\$comp"
      $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericAll", "Allow")
      $acl.AddAccessRule($rule)
      Set-ACL "AD:\$comp" $acl
    }
  ignore_errors: yes

- name: Weak ACL on AdminSDHolder container (PER-015)
  win_shell: |
    Import-Module ActiveDirectory
    $source = Get-ADUser -Identity "user3"
    $target = Get-ADObject -Identity "CN=AdminSDHolder,CN=System,DC=corp,DC=local"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($source.SID)
    $acl = Get-ACL "AD:\$target"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "GenericAll", "Allow")
    $acl.AddAccessRule($rule)
    Set-ACL "AD:\$target" $acl
  ignore_errors: yes
