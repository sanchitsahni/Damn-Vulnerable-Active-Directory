---
# ==============================================================================
# DVAD - Phase 4: Privilege Escalation on ws01.corp.local
# Covers PE-011, PE-012, PE-016, PE-022, PE-023, PE-024, PE-027, PE-049,
# PE-050, PE-051, PE-056, PE-060 surfaces.
# ==============================================================================

# ------------------------------------------------------------------------------
# PE-011: AlwaysInstallElevated (both hives required)
# ------------------------------------------------------------------------------
- name: PE-011 - AlwaysInstallElevated HKLM
  ansible.windows.win_regedit:
    path: 'HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer'
    name: AlwaysInstallElevated
    data: 1
    type: dword
  ignore_errors: yes

- name: PE-011 - AlwaysInstallElevated HKCU (default user hive)
  ansible.windows.win_regedit:
    path: 'HKCU:\SOFTWARE\Policies\Microsoft\Windows\Installer'
    name: AlwaysInstallElevated
    data: 1
    type: dword
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-012 / PE-056: Lower UAC so auto-elevate bypasses (FodHelper/sdclt/WSReset)
# work without prompt for medium-IL admin. EnableLUA stays on so the bypass
# techniques themselves remain in scope.
# ------------------------------------------------------------------------------
- name: PE-012/056 - Set ConsentPromptBehaviorAdmin = 0 (auto-elevate)
  ansible.windows.win_regedit:
    path: 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'
    name: ConsentPromptBehaviorAdmin
    data: 0
    type: dword
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-016 / PE-022: Writable scheduled task action (.bat under Users-writable dir)
# ------------------------------------------------------------------------------
- name: PE-016 - Ensure C:\VulnTasks exists
  ansible.windows.win_file:
    path: 'C:\VulnTasks'
    state: directory
  ignore_errors: yes

- name: PE-016 - Drop writable task action script
  ansible.windows.win_copy:
    dest: 'C:\VulnTasks\sync.bat'
    content: |
      @echo off
      rem placeholder action - overwrite me
      exit /b 0
  ignore_errors: yes

- name: PE-016 - Grant Users full control on task action
  ansible.windows.win_shell: |
    icacls "C:\VulnTasks" /grant "BUILTIN\Users:(OI)(CI)F" | Out-Null
    schtasks /Create /TN "CorpSync" /TR "C:\VulnTasks\sync.bat" /SC ONSTART /RU SYSTEM /F | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-023: Startup folder writable by Domain Users
# ------------------------------------------------------------------------------
- name: PE-023 - Loosen All-Users Startup folder DACL
  ansible.windows.win_shell: |
    $p = "$env:ProgramData\Microsoft\Windows\Start Menu\Programs\StartUp"
    icacls $p /grant "CORP\Domain Users:(OI)(CI)M" | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-024: HiveNightmare / SeriousSAM precondition — VSS readable by Users.
# We can't realistically reproduce CVE-2021-36934 on a patched host, but we
# can grant Users read on the SAM/SYSTEM/SECURITY hives, which is the same
# effective primitive.
# ------------------------------------------------------------------------------
- name: PE-024 - Grant BUILTIN\Users read on registry hive files
  ansible.windows.win_shell: |
    foreach ($h in @('SAM','SYSTEM','SECURITY')) {
      icacls "$env:windir\System32\config\$h" /grant "BUILTIN\Users:(R)" 2>$null | Out-Null
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-027: SeCreateSymbolicLinkPrivilege for the "Developers" local group.
# Grant a domain group (developer1) the privilege via secedit.
# ------------------------------------------------------------------------------
- name: PE-027 - Grant SeCreateSymbolicLinkPrivilege to developer1
  ansible.windows.win_shell: |
    $tmp = "$env:TEMP\sec.inf"
    secedit /export /cfg $tmp | Out-Null
    $content = Get-Content $tmp
    # Resolve the SID for CORP\developer1
    try {
      $sid = (New-Object System.Security.Principal.NTAccount("CORP","developer1")).Translate([System.Security.Principal.SecurityIdentifier]).Value
      $line = "SeCreateSymbolicLinkPrivilege = *$sid"
      if ($content -match "SeCreateSymbolicLinkPrivilege") {
        $content = $content -replace "SeCreateSymbolicLinkPrivilege.*", $line
      } else {
        $content = $content + $line
      }
      Set-Content -Path $tmp -Value $content
      secedit /configure /db secedit.sdb /cfg $tmp /areas USER_RIGHTS | Out-Null
    } catch { Write-Host "SeCreateSymbolicLink grant: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-049: Vulnerable signed driver placeholder (RTCore64 / Capcom).
# We only stage the directory + marker — actually loading a vulnerable driver
# requires the participant to use SeLoadDriverPrivilege themselves.
# ------------------------------------------------------------------------------
- name: PE-049 - Stage vulnerable driver drop folder
  ansible.windows.win_file:
    path: 'C:\DVAD\drivers'
    state: directory
  ignore_errors: yes

- name: PE-049 - Marker for vulnerable driver expectation
  ansible.windows.win_copy:
    dest: 'C:\DVAD\drivers\README.txt'
    content: |
      Drop RTCore64.sys / Capcom.sys / gdrv.sys here.
      Local admin + SeLoadDriverPrivilege -> kernel R/W primitives.
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-050: Windows Installer repair-mode escalation. Stage an .msi that
# repairs from a writable cache. We only ensure the cache folder is writable;
# any signed cached msi will then accept replacement during repair.
# ------------------------------------------------------------------------------
- name: PE-050 - Loosen MSI cache folder DACL
  ansible.windows.win_shell: |
    icacls "$env:windir\Installer" /grant "BUILTIN\Users:(OI)(CI)RX" 2>$null | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PE-051: KrbRelayUp precondition - default LSASS named pipe + machine
# account msDS-AllowedToActOnBehalfOfOtherIdentity self-write.
# MachineAccountQuota=10 (set in CRED-021) plus default RBCD ACL are enough.
# Nothing else to do here.
# ------------------------------------------------------------------------------
- name: PE-051 - KrbRelayUp preconditions inherent (MAQ=10, default RBCD ACL)
  debug: { msg: "PE-051 inherent: MAQ=10 (CRED-021) + default machine-account self-write" }

# ------------------------------------------------------------------------------
# PE-060: TrustedInstaller boundary - PsExec -s -i ti.exe is a SYSTEM-context
# action, no host config needed. Documented only.
# ------------------------------------------------------------------------------
- name: PE-060 - Documented (psexec -s -i to TrustedInstaller, no config)
  debug: { msg: "PE-060 inherent on default install" }
