        LAT-011 ESC1 cert auth             -> adcs_vulns role
        LAT-016 RBCD chain                 -> CRED-017 + vuln-kerberos.yml
        LAT-017 ForceChangePassword        -> vuln-acl.yml
        LAT-019 KeyCredentialLink write    -> CRED-008
        LAT-021 GenericAll on domain       -> CRED-013/014 (sync_user)
        LAT-022 WriteSPN                   -> vuln-acl.yml
        LAT-024 LDAP signing not required  -> REC-006 + CRED-048
        LAT-025 WebDAV / srvsvc coercion   -> CRED-022/049 (WebClient up)
        LAT-026 KrbRelayUp                 -> default LSASS pipe + RBCD self-write
