- name: PER-031 - Schema backdoor flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-031-Schema.txt'
    content: "PER-031: Schema Admins can add malicious classSchema/attributeSchema - irreversible."
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-032: Hidden account via Confidentiality flag (searchFlags bit 7).
# Set the bit on attacker user so it's excluded from list_object enumeration.
# Reversible via Set-ADUser -Clear.
# ------------------------------------------------------------------------------
- name: PER-032 - Hidden account via list_object exclusion
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      $u = Get-ADUser -Identity attacker -Properties nTSecurityDescriptor
      $domain = (Get-ADDomain).DistinguishedName
      # Deny List Contents to Authenticated Users on the user object
      $sid = New-Object System.Security.Principal.SecurityIdentifier 'S-1-5-11'  # Authenticated Users
      $acl = Get-Acl "AD:\$($u.DistinguishedName)"
      $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, 'ListChildren', 'Deny')
      $acl.AddAccessRule($rule)
      Set-Acl -Path "AD:\$($u.DistinguishedName)" -AclObject $acl
    } catch { Write-Host "Hidden account: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-034: GPO Backdoor - inject a scheduled task into Default Domain Policy.
# We pre-create the ScheduledTasks.xml under the GPO scripts folder.
# ------------------------------------------------------------------------------
- name: PER-034 - GPO scheduled-task backdoor (DDP)
  ansible.windows.win_shell: |-
    $domain = (Get-ADDomain).DNSRoot
    $ddp = "C:\Windows\SYSVOL\sysvol\$domain\Policies\{31B2F340-016D-11D2-945F-00C04FB984F9}\Machine\Preferences\ScheduledTasks"
    if (-not (Test-Path $ddp)) { New-Item -ItemType Directory -Path $ddp -Force | Out-Null }
  ignore_errors: yes

- name: PER-034 - Drop ScheduledTasks.xml under DDP
  ansible.windows.win_copy:
    dest: 'C:\Windows\SYSVOL\sysvol\corp.local\Policies\{31B2F340-016D-11D2-945F-00C04FB984F9}\Machine\Preferences\ScheduledTasks\ScheduledTasks.xml'
    content: |
      <?xml version="1.0" encoding="utf-8"?>
      <ScheduledTasks clsid="{CC63F200-7309-4ba0-B154-A71CD118DBCC}">
        <ImmediateTaskV2 clsid="{9756B581-76EC-4169-9AFC-0CA8D43ADB5F}"
          name="DVAD-GPO-Backdoor" image="0" changed="2024-01-01 00:00:00"
          uid="{11111111-1111-1111-1111-111111111111}">
          <Properties action="C" name="DVAD-GPO-Backdoor" runAs="NT AUTHORITY\SYSTEM"
            logonType="S4U">
            <Task version="1.3">
              <RegistrationInfo><Author>SYSTEM</Author></RegistrationInfo>
              <Principals>
                <Principal id="Author">
                  <UserId>NT AUTHORITY\SYSTEM</UserId>
                  <RunLevel>HighestAvailable</RunLevel>
                </Principal>
              </Principals>
              <Settings><Enabled>true</Enabled></Settings>
              <Actions Context="Author">
                <Exec><Command>cmd.exe</Command><Arguments>/c rem dvad-backdoor</Arguments></Exec>
              </Actions>
            </Task>
          </Properties>
        </ImmediateTaskV2>
      </ScheduledTasks>
  ignore_errors: yes

