# ------------------------------------------------------------------------------
# PER-036: MachineAccountQuota persistence - already set to 10 in CRED-021.
# Verify.
# ------------------------------------------------------------------------------
- name: PER-036 - Verify MachineAccountQuota=10
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      $maq = (Get-ADObject (Get-ADDomain).DistinguishedName -Properties ms-DS-MachineAccountQuota).'ms-DS-MachineAccountQuota'
      Write-Host "MAQ = $maq"
    } catch { Write-Host "MAQ check: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-037: Privileged service account with TRUSTED_FOR_DELEGATION (unconstrained)
# Create svc_legacy with SPN and unconstrained delegation flag set.
# ------------------------------------------------------------------------------
- name: PER-037 - Create svc_legacy with unconstrained delegation
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      if (-not (Get-ADUser -Filter "SamAccountName -eq 'svc_legacy'" -ErrorAction SilentlyContinue)) {
        $p = ConvertTo-SecureString 'LegacySvc2024!' -AsPlainText -Force
        New-ADUser -Name 'svc_legacy' -SamAccountName 'svc_legacy' `
          -AccountPassword $p -Enabled $true -PasswordNeverExpires $true `
          -Path "CN=Users,DC=corp,DC=local" `
          -ServicePrincipalNames @('HTTP/legacy.corp.local')
      }
      # Set TRUSTED_FOR_DELEGATION via UAC flags
      Set-ADAccountControl -Identity 'svc_legacy' -TrustedForDelegation $true
    } catch { Write-Host "svc_legacy: $($_.Exception.Message)" }
  ignore_errors: yes
