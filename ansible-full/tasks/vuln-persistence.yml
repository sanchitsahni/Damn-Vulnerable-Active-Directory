- name: PER-019 - Silver Ticket flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-019-SilverTicket.txt'
    content: "PER-019: Forge service ticket for svc_web (SPN HTTP/file01) - silver ticket vs target service."
  ignore_errors: yes

# ------------------------------------------------------------------------------
# PER-020: Skeleton Key - runtime injection only (mimikatz misc::skeleton).
# Hint marker.
