- name: PER-020 - Skeleton Key flag marker
  ansible.windows.win_copy:
    dest: 'C:\Flags\FLAG-PER-020-SkeletonKey.txt'
    content: "PER-020: misc::skeleton on LSASS - any user auths with master password 'mimikatz'."
