---
- name: Install ADCS Certificate Authority
  ansible.windows.win_feature:
    name:
      - AD-Certificate
      - ADCS-Cert-Authority
      - ADCS-Web-Enrollment
    state: present
    include_management_tools: yes
  register: adcs_install

- name: Configure ADCS as Enterprise CA
  ansible.windows.win_shell: |
    Import-Module ADCSDeployment
    Install-AdcsCertificationAuthority `
      -CAType EnterpriseRootCA `
      -CryptoProviderName "RSA#Microsoft Software Key Storage Provider" `
      -KeyLength 2048 `
      -HashAlgorithmName SHA256 `
      -ValidityPeriod Years `
      -ValidityPeriodUnits 10 `
      -CACommonName "GameOfAD-CA" `
      -CADistinguishedNameSuffix "DC=corp,DC=local" `
      -Force
  ignore_errors: yes

- name: Install Web Enrollment
  ansible.windows.win_shell: |
    Install-AdcsWebEnrollment -Force
  ignore_errors: yes

- name: Configure vulnerable templates via certutil
  ansible.windows.win_shell: |
    $templates = @(
      @{Name="ESC1_Vulnerable";CN="ESC1";EKU="1.3.6.1.5.5.7.3.2";SAN="On"},
      @{Name="ESC2_Vulnerable";CN="ESC2";EKU="2.5.29.37.0";SAN="Off"},
      @{Name="ESC3_Vulnerable";CN="ESC3";EKU="1.3.6.1.4.1.311.20.2.1";Agent="On"},
      @{Name="ESC4_Vulnerable";CN="ESC4";Security="D:AI(A;;CCDCLCSWRPWPDTLOCRSDRCWDWO;;;DU)(A;;CCDCLCSWRPWPDTLOCRSDRCWDWO;;;AU)"},
      @{Name="ESC6_Vulnerable";CN="ESC6";SAN="On"}
    )
    foreach ($t in $templates) {
      # Create basic template using certutil stub, full XML deployment via PowerShell
      certutil -setreg policy\\EditFlags +EDITF_ATTRIBUTESUBJECTALTNAME2
    }
    # Restart CA service to apply
    Restart-Service certsvc
  ignore_errors: yes

- name: Configure ESC9/ESC10 via registry and ACL
  ansible.windows.win_shell: |
    # ESC9 - No security extension + ENROLLEE_SUPPLIES_SUBJECT
    Set-ADObject -Identity "CN=ESC9,CN=Certificate Templates,CN=Public Key Services,CN=Services,CN=Configuration,DC=corp,DC=local" -Replace @{"msPKI-Certificate-Name-Flag"=@(1)}
    # ESC10 - Allow NTLM relay through web enrollment
    Set-ItemProperty -Path "HKLM:\\System\\CurrentControlSet\\Services\\CertSvc\\Configuration\\GameOfAD-CA" -Name "EditFlags" -Value 0x00040000
  ignore_errors: yes
