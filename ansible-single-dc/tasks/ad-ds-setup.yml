---
# ==============================================================================
# DVAD - AD DS Installation and Domain Controller Promotion
# Target: dc01.corp.local
# ==============================================================================

- name: Set static IP and DNS
  win_shell: |
    Start-Sleep -Seconds 5
    $adapter = Get-NetAdapter | Where-Object { $_.Status -eq "Up" } | Select-Object -First 1
    $ip = "10.10.0.10"
    $prefix = 21
    $gateway = "10.10.0.1"
    $dns = "10.10.0.10"
    netsh interface ip set address "$($adapter.Name)" static $ip 255.255.248.0 $gateway 1
    netsh interface ip set dns "$($adapter.Name)" static $dns
    Write-Host "IP configured: $ip/21"
  async: 20
  poll: 0

- name: Wait for network to stabilize and IP change to complete
  wait_for_connection:
    delay: 15
    timeout: 60

- name: Reset WinRM connection to clear stale sockets
  meta: reset_connection

- name: Set hostname
  win_hostname:
    name: "dc01"
  register: hostname_result

- name: Install AD DS Features
  win_feature:
    name:
      - AD-Domain-Services
      - DNS
      - GPMC
      - RSAT-ADDS
      - RSAT-DNS-Server
      - RSAT-AD-PowerShell
    state: present
    include_management_tools: yes
  register: ad_ds_install

- name: Reboot if required before promotion
  win_reboot:
  when: ad_ds_install.reboot_required or hostname_result.reboot_required

- name: Check if already a Domain Controller
  win_shell: |
    (Get-CimInstance -ClassName Win32_ComputerSystem).DomainRole
  register: domain_role

- name: Create new forest corp.local
  win_shell: |
    Import-Module ADDSDeployment

    $params = @{
      DomainName                    = "corp.local"
      DomainNetbiosName             = "CORP"
      ForestMode                    = "WinThreshold"
      DomainMode                    = "WinThreshold"
      DatabasePath                  = "C:\Windows\NTDS"
      LogPath                       = "C:\Windows\NTDS"
      SysvolPath                    = "C:\Windows\SYSVOL"
      SafeModeAdministratorPassword = (ConvertTo-SecureString "DVADlab2024!" -AsPlainText -Force)
      InstallDns                    = $true
      CreateDnsDelegation           = $false
      NoRebootOnCompletion          = $false
      Force                         = $true
    }

    Install-ADDSForest @params
  register: forest_promotion
  async: 1800
  poll: 0
  when: domain_role.stdout | trim not in ['4', '5']

- name: Dynamically switch to Domain Admin credentials while rebooting
  set_fact:
    ansible_user: "Administrator@corp.local"
  when: domain_role.stdout | trim not in ['4', '5']

- name: Wait for DC to reboot and WinRM to come back up with new credentials
  wait_for_connection:
    delay: 60
    timeout: 900
  when: domain_role.stdout | trim not in ['4', '5']

- name: Wait for WinRM to come back up with new credentials
  wait_for_connection:
    delay: 30
    timeout: 600
  when: reboot_result.unreachable is defined and reboot_result.unreachable
